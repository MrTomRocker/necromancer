[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = [
    "B",    # flake8-bugbear
    "BLE",  # flake8-blind-except
    "C4",   # flake8-comprehensions
    "D",    # pydocstyle (docstrings) — match HA core
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "ICN",  # flake8-import-conventions
    "PGH",  # pygrep-hooks
    "RUF",  # ruff-specific rules
    "SIM",  # flake8-simplify
    "UP",   # pyupgrade
    "W",    # pycodestyle warnings
]
ignore = [
    "E501",    # line length is handled by the formatter (strings aren't wrapped)
    "RUF012",  # mutable class attrs: HA's _attr_ pattern is intentional
    # Docstring rules HA core also disables (formatter conflicts / style choices):
    "D202",    # no blank line allowed after function docstring
    "D203",    # 1 blank line before class docstring (conflicts with D211)
    "D206",    # docstring indentation — handled by the formatter
    "D213",    # multi-line summary on second line (we put it on the first)
    "D300",    # triple double quotes — handled by the formatter
    "D406",    # section name should end with a newline
    "D407",    # section name underlining
    "D417",    # missing arg descriptions — document only non-obvious params
]

[tool.ruff.lint.isort]
force-sort-within-sections = true
combine-as-imports = true
known-first-party = ["homeassistant"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pylint."MESSAGES CONTROL"]
