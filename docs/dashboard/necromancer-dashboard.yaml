# ============================================================
# necromancer - 'All Guards' dashboard (full bundle)
# All 7 cards of the fleet overview, in order.
# Paste as the cards: of a Section (Sections view) or into a vertical-stack.
# Requires necromancer >= 0.2.2 + HACS cards: mushroom, bubble-card, auto-entities,
# config-template-card, layout-card, card-mod.
# ============================================================

# --- Fleet status banner ---
- type: custom:mushroom-template-card
  primary: |-
    {%- set guards = integration_entities('necromancer') | select('match', 'sensor') | list -%}
    {%- set rank = {'ok': 0, 'snoozed': 0, 'cooldown': 1, 'verify': 2, 'suspect': 3, 'recovering': 4, 'escalated': 5} -%}
    {%- set ns = namespace(worst='ok', maxr=0, snoozed=0, alarm=false) -%}
    {%- for e in guards -%}
      {%- set s = states(e) -%}
      {%- if s == 'snoozed' -%}{%- set ns.snoozed = ns.snoozed + 1 -%}{%- endif -%}
      {%- if s == 'escalated' -%}{%- set ns.alarm = true -%}{%- endif -%}
      {%- set r = rank.get(s, 0) -%}
      {%- if r > ns.maxr -%}{%- set ns.maxr = r -%}{%- set ns.worst = s -%}{%- endif -%}
    {%- endfor -%}
    {%- set display = 'snoozed' if (ns.worst == 'ok' and ns.snoozed > 0) else ns.worst -%}
    {{ {
      'ok':         'Alle Systeme nominal',
      'cooldown':   'Stabilisiert sich',
      'verify':     'Verifiziere Wiederherstellung',
      'suspect':    'Verdacht erkannt',
      'recovering': 'Reparatur läuft',
      'escalated':  'ALARM eskaliert'
    }.get(ns.worst, 'Beobachtung') }}
  secondary: |-
    {%- set guards = integration_entities('necromancer') | select('match', 'sensor') | list -%}
    {%- set rank = {'ok': 0, 'snoozed': 0, 'cooldown': 1, 'verify': 2, 'suspect': 3, 'recovering': 4, 'escalated': 5} -%}
    {%- set ns = namespace(worst='ok', maxr=0, snoozed=0, alarm=false) -%}
    {%- for e in guards -%}
      {%- set s = states(e) -%}
      {%- if s == 'snoozed' -%}{%- set ns.snoozed = ns.snoozed + 1 -%}{%- endif -%}
      {%- if s == 'escalated' -%}{%- set ns.alarm = true -%}{%- endif -%}
      {%- set r = rank.get(s, 0) -%}
      {%- if r > ns.maxr -%}{%- set ns.maxr = r -%}{%- set ns.worst = s -%}{%- endif -%}
    {%- endfor -%}
    {%- set display = 'snoozed' if (ns.worst == 'ok' and ns.snoozed > 0) else ns.worst -%}
    {{ (ns.snoozed ~ ' im Wartungsmodus') if ns.snoozed > 0 else '' }}
  icon: |-
    {%- set guards = integration_entities('necromancer') | select('match', 'sensor') | list -%}
    {%- set rank = {'ok': 0, 'snoozed': 0, 'cooldown': 1, 'verify': 2, 'suspect': 3, 'recovering': 4, 'escalated': 5} -%}
    {%- set ns = namespace(worst='ok', maxr=0, snoozed=0, alarm=false) -%}
    {%- for e in guards -%}
      {%- set s = states(e) -%}
      {%- if s == 'snoozed' -%}{%- set ns.snoozed = ns.snoozed + 1 -%}{%- endif -%}
      {%- if s == 'escalated' -%}{%- set ns.alarm = true -%}{%- endif -%}
      {%- set r = rank.get(s, 0) -%}
      {%- if r > ns.maxr -%}{%- set ns.maxr = r -%}{%- set ns.worst = s -%}{%- endif -%}
    {%- endfor -%}
    {%- set display = 'snoozed' if (ns.worst == 'ok' and ns.snoozed > 0) else ns.worst -%}
    {{ {
      'ok':         'mdi:check-circle',
      'cooldown':   'mdi:timer-sand',
      'verify':     'mdi:heart-pulse',
      'suspect':    'mdi:alert-circle-outline',
      'recovering': 'mdi:loading',
      'escalated':  'mdi:alert-octagon',
      'snoozed':    'mdi:sleep'
    }.get(display, 'mdi:help') }}
  icon_color: |-
    {%- set guards = integration_entities('necromancer') | select('match', 'sensor') | list -%}
    {%- set rank = {'ok': 0, 'snoozed': 0, 'cooldown': 1, 'verify': 2, 'suspect': 3, 'recovering': 4, 'escalated': 5} -%}
    {%- set ns = namespace(worst='ok', maxr=0, snoozed=0, alarm=false) -%}
    {%- for e in guards -%}
      {%- set s = states(e) -%}
      {%- if s == 'snoozed' -%}{%- set ns.snoozed = ns.snoozed + 1 -%}{%- endif -%}
      {%- if s == 'escalated' -%}{%- set ns.alarm = true -%}{%- endif -%}
      {%- set r = rank.get(s, 0) -%}
      {%- if r > ns.maxr -%}{%- set ns.maxr = r -%}{%- set ns.worst = s -%}{%- endif -%}
    {%- endfor -%}
    {%- set display = 'snoozed' if (ns.worst == 'ok' and ns.snoozed > 0) else ns.worst -%}
    {{ {
      'ok':         '#4caf50',
      'cooldown':   '#78909c',
      'verify':     '#00bcd4',
      'suspect':    '#ff9800',
      'recovering': '#2196f3',
      'escalated':  '#f44336',
      'snoozed':    '#9c27b0'
    }.get(display, '#78909c') }}
  multiline_secondary: false
  tap_action:
    action: navigate
    navigation_path: '#necro-guards'
  card_mod:
    style:
      .: |-
        {%- set guards = integration_entities('necromancer') | select('match', 'sensor') | list -%}
        {%- set rank = {'ok': 0, 'snoozed': 0, 'cooldown': 1, 'verify': 2, 'suspect': 3, 'recovering': 4, 'escalated': 5} -%}
        {%- set ns = namespace(worst='ok', maxr=0, snoozed=0, alarm=false) -%}
        {%- for e in guards -%}
          {%- set s = states(e) -%}
          {%- if s == 'snoozed' -%}{%- set ns.snoozed = ns.snoozed + 1 -%}{%- endif -%}
          {%- if s == 'escalated' -%}{%- set ns.alarm = true -%}{%- endif -%}
          {%- set r = rank.get(s, 0) -%}
          {%- if r > ns.maxr -%}{%- set ns.maxr = r -%}{%- set ns.worst = s -%}{%- endif -%}
        {%- endfor -%}
        {%- set display = 'snoozed' if (ns.worst == 'ok' and ns.snoozed > 0) else ns.worst -%}
        {%- set rgb = {
          'ok':         '76,175,80',
          'cooldown':   '120,144,156',
          'verify':     '0,188,212',
          'suspect':    '255,152,0',
          'recovering': '33,150,243',
          'escalated':  '244,67,54',
          'snoozed':    '156,39,176'
        }.get(display, '120,144,156') -%}
        ha-card {
          height: 100%;
          min-height: 110px;
          border-radius: 20px;
          padding: 18px 22px;
          background: linear-gradient(135deg, rgba({{ rgb }},0.30) 0%, rgba({{ rgb }},0.08) 100%);
          border: 1px solid rgba({{ rgb }},0.65);
          {% if ns.alarm %}animation: mc-pulse 1.4s ease-in-out infinite;{% endif %}
        }
        @keyframes mc-pulse {
          0%, 100% { box-shadow: 0 0 0 0 rgba(244,67,54,0.55); }
          50%      { box-shadow: 0 0 22px 4px rgba(244,67,54,0.55); }
        }
        mushroom-shape-icon { --icon-size: 54px; }
      mushroom-shape-icon:
        $: |-
          .shape {
            background: transparent !important;
            box-shadow: none !important;
          }
          ha-icon { --mdc-icon-size: 50px; }
      mushroom-state-info:
        $: |-
          .primary::before {
            content: 'NECROMANCER FLEET-STATUS';
            display: block;
            font-size: 14px;
            font-weight: 600;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
          }
          .primary {
            font-size: 26px;
            font-weight: 700;
            line-height: 1.15;
          }
          .secondary {
            font-size: 13px;
            font-weight: 600;
            color: #9c27b0;
          }
  grid_options:
    columns: 12
    rows: 2

# --- Status chips ---
- type: custom:mushroom-chips-card
  alignment: center
  chips:
  - type: template
    icon: mdi:check-circle
    icon_color: green
    content: |-
      {{ integration_entities('necromancer')
         | select('match', 'sensor')
         | select('is_state', 'ok')
         | list | count }} OK
  - type: template
    icon: mdi:alert-circle-outline
    icon_color: orange
    content: |-
      {{ integration_entities('necromancer')
         | select('match', 'sensor')
         | select('is_state', 'suspect')
         | list | count }} Verdacht
  - type: template
    icon: mdi:loading
    icon_color: blue
    content: |-
      {{ integration_entities('necromancer')
         | select('match', 'sensor')
         | select('is_state', 'recovering')
         | list | count }} Reparatur
  - type: template
    icon: mdi:heart-pulse
    icon_color: cyan
    content: |-
      {{ integration_entities('necromancer')
         | select('match', 'sensor')
         | select('is_state', 'verify')
         | list | count }} Verify
  - type: template
    icon: mdi:alert-octagon
    icon_color: red
    content: |-
      {{ integration_entities('necromancer')
         | select('match', 'sensor')
         | select('is_state', 'escalated')
         | list | count }} Alarm
  - type: template
    icon: mdi:sleep
    icon_color: purple
    content: |-
      {{ integration_entities('necromancer')
         | select('match', 'sensor')
         | select('is_state', 'snoozed')
         | list | count }} Snooze
    tap_action:
      action: perform-action
      perform_action: necromancer.unsnooze_all

# --- 'Live incidents' heading ---
- type: heading
  heading: Live-Incidents
  heading_style: subtitle
  icon: mdi:pulse

# --- Live incidents ---
- type: custom:auto-entities
  show_empty: false
  card:
    type: grid
    columns: 1
    square: false
  card_param: cards
  filter:
    include:
    - integration: necromancer
      state: escalated
      attributes:
        guard_name: '*'
      options:
        type: custom:config-template-card
        entities:
        - this.entity_id
        card:
          type: custom:mushroom-template-card
          entity: this.entity_id
          primary: '{{ state_attr(config.entity, ''guard_name'') }}'
          secondary: |-
            {%- set attempt = state_attr(config.entity, 'attempt') | default('?') -%}
            {%- set rd = (state_attr(config.entity, 'recover_driver') or '—').split('→')[0].strip() -%}
            {%- set rd = rd.split('.', 1)[1] if (' ' not in rd and '.' in rd) else rd -%}
            Eskaliert · Versuch {{ attempt }} · {{ rd }}
          icon: mdi:alert-octagon
          icon_color: red
          badge_icon: |-
            {%- set h = state_attr(config.entity, 'health_entity') -%}
            {{ 'mdi:lan-disconnect' if is_state(h, 'off')
               else ('mdi:lan-pending' if states(h) in ['unavailable', 'unknown']
               else 'mdi:lan-connect') }}
          badge_color: |-
            {%- set h = state_attr(config.entity, 'health_entity') -%}
            {{ 'red' if is_state(h, 'off')
               else ('grey' if states(h) in ['unavailable', 'unknown']
               else 'green') }}
          tap_action:
            action: navigate
            navigation_path: ${ '/config/devices/device/' + this.hass.entities['this.entity_id'].device_id }
          card_mod:
            style:
              .: |-
                ha-card {
                  border: 1px solid rgba(244,67,54,0.6);
                  animation: mc-row-pulse 1.6s ease-in-out infinite;
                }
                @keyframes mc-row-pulse {
                  0%, 100% { box-shadow: 0 0 0 0 rgba(244,67,54,0.4); }
                  50%      { box-shadow: 0 0 14px 2px rgba(244,67,54,0.4); }
                }
              mushroom-state-info$: |-
                .primary {
                  white-space: nowrap !important;
                  overflow: hidden !important;
                  text-overflow: ellipsis !important;
                  display: block !important;
                }
    - integration: necromancer
      state: recovering
      attributes:
        guard_name: '*'
      options:
        type: custom:config-template-card
        entities:
        - this.entity_id
        card:
          type: custom:mushroom-template-card
          entity: this.entity_id
          primary: '{{ state_attr(config.entity, ''guard_name'') }}'
          secondary: |-
            {%- set attempt = state_attr(config.entity, 'attempt') | default('?') -%}
            {%- set rd = (state_attr(config.entity, 'recover_driver') or '—').split('→')[0].strip() -%}
            {%- set rd = rd.split('.', 1)[1] if (' ' not in rd and '.' in rd) else rd -%}
            Reparatur · Versuch {{ attempt }} · {{ rd }}
          icon: mdi:loading
          icon_color: blue
          badge_icon: |-
            {%- set h = state_attr(config.entity, 'health_entity') -%}
            {{ 'mdi:lan-disconnect' if is_state(h, 'off')
               else ('mdi:lan-pending' if states(h) in ['unavailable', 'unknown']
               else 'mdi:lan-connect') }}
          badge_color: |-
            {%- set h = state_attr(config.entity, 'health_entity') -%}
            {{ 'red' if is_state(h, 'off')
               else ('grey' if states(h) in ['unavailable', 'unknown']
               else 'green') }}
          tap_action:
            action: navigate
            navigation_path: ${ '/config/devices/device/' + this.hass.entities['this.entity_id'].device_id }
          card_mod:
            style:
              mushroom-state-info$: |-
                .primary {
                  white-space: nowrap !important;
                  overflow: hidden !important;
                  text-overflow: ellipsis !important;
                  display: block !important;
                }
    - integration: necromancer
      state: suspect
      attributes:
        guard_name: '*'
      options:
        type: custom:config-template-card
        entities:
        - this.entity_id
        card:
          type: custom:mushroom-template-card
          entity: this.entity_id
          primary: '{{ state_attr(config.entity, ''guard_name'') }}'
          secondary: |-
            {%- set attempt = state_attr(config.entity, 'attempt') | default('?') -%}
            {%- set rd = (state_attr(config.entity, 'recover_driver') or '—').split('→')[0].strip() -%}
            {%- set rd = rd.split('.', 1)[1] if (' ' not in rd and '.' in rd) else rd -%}
            Verdacht · Versuch {{ attempt }} · {{ rd }}
          icon: mdi:alert-circle-outline
          icon_color: orange
          badge_icon: |-
            {%- set h = state_attr(config.entity, 'health_entity') -%}
            {{ 'mdi:lan-disconnect' if is_state(h, 'off')
               else ('mdi:lan-pending' if states(h) in ['unavailable', 'unknown']
               else 'mdi:lan-connect') }}
          badge_color: |-
            {%- set h = state_attr(config.entity, 'health_entity') -%}
            {{ 'red' if is_state(h, 'off')
               else ('grey' if states(h) in ['unavailable', 'unknown']
               else 'green') }}
          tap_action:
            action: navigate
            navigation_path: ${ '/config/devices/device/' + this.hass.entities['this.entity_id'].device_id }
          card_mod:
            style:
              mushroom-state-info$: |-
                .primary {
                  white-space: nowrap !important;
                  overflow: hidden !important;
                  text-overflow: ellipsis !important;
                  display: block !important;
                }
    - integration: necromancer
      state: verify
      attributes:
        guard_name: '*'
      options:
        type: custom:config-template-card
        entities:
        - this.entity_id
        card:
          type: custom:mushroom-template-card
          entity: this.entity_id
          primary: '{{ state_attr(config.entity, ''guard_name'') }}'
          secondary: |-
            {%- set attempt = state_attr(config.entity, 'attempt') | default('?') -%}
            {%- set rd = (state_attr(config.entity, 'recover_driver') or '—').split('→')[0].strip() -%}
            {%- set rd = rd.split('.', 1)[1] if (' ' not in rd and '.' in rd) else rd -%}
            Verify · Versuch {{ attempt }} · {{ rd }}
          icon: mdi:heart-pulse
          icon_color: cyan
          badge_icon: |-
            {%- set h = state_attr(config.entity, 'health_entity') -%}
            {{ 'mdi:lan-disconnect' if is_state(h, 'off')
               else ('mdi:lan-pending' if states(h) in ['unavailable', 'unknown']
               else 'mdi:lan-connect') }}
          badge_color: |-
            {%- set h = state_attr(config.entity, 'health_entity') -%}
            {{ 'red' if is_state(h, 'off')
               else ('grey' if states(h) in ['unavailable', 'unknown']
               else 'green') }}
          tap_action:
            action: navigate
            navigation_path: ${ '/config/devices/device/' + this.hass.entities['this.entity_id'].device_id }
          card_mod:
            style:
              mushroom-state-info$: |-
                .primary {
                  white-space: nowrap !important;
                  overflow: hidden !important;
                  text-overflow: ellipsis !important;
                  display: block !important;
                }
  sort:
    method: state

# --- Green 'all OK' card ---
- type: custom:mushroom-template-card
  primary: |-
    {%- set snoozed = integration_entities('necromancer') | select('match', 'sensor') | select('is_state', 'snoozed') | list | count -%}
    {%- set total = integration_entities('necromancer') | select('match', 'sensor') | list | count -%}
    {{ 'Alle ' ~ total ~ ' Wächter OK'
       if snoozed == 0
       else (snoozed ~ ' von ' ~ total ~ ' im Wartungsmodus') }}
  secondary: |-
    {%- set snoozed = integration_entities('necromancer') | select('match', 'sensor') | select('is_state', 'snoozed') | list | count -%}
    {{ 'Keine aktiven Incidents - alles ruhig.'
       if snoozed == 0
       else 'Keine Incidents · die übrigen sind OK.' }}
  icon: |-
    {%- set snoozed = integration_entities('necromancer') | select('match', 'sensor') | select('is_state', 'snoozed') | list | count -%}
    {{ 'mdi:shield-check' if snoozed == 0 else 'mdi:sleep' }}
  icon_color: |-
    {%- set snoozed = integration_entities('necromancer') | select('match', 'sensor') | select('is_state', 'snoozed') | list | count -%}
    {{ 'green' if snoozed == 0 else 'purple' }}
  layout: horizontal
  fill_container: true
  tap_action:
    action: navigate
    navigation_path: '#necro-guards'
  card_mod:
    style: |-
      {%- set incidents = integration_entities('necromancer') | select('match', 'sensor') | map('states') | select('in', ['suspect', 'recovering', 'verify', 'escalated']) | list | count -%}
      {%- set snoozed = integration_entities('necromancer') | select('match', 'sensor') | select('is_state', 'snoozed') | list | count -%}
      {%- set c = '156,39,176' if snoozed > 0 else '76,175,80' -%}
      ha-card {
        background: rgba({{ c }},0.10);
        border: 1px solid rgba({{ c }},0.45);
        border-radius: 18px;
        {% if incidents > 0 %}display: none !important;{% endif %}
      }
  grid_options:
    columns: 12
    rows: 1

# --- Maintenance chips ---
- type: custom:mushroom-chips-card
  alignment: center
  chips:
  - type: template
    icon: mdi:sleep
    icon_color: purple
    content: Wartungsmodus
    tap_action:
      action: perform-action
      perform_action: necromancer.snooze_all
      data:
        duration: 01:00:00
  - type: template
    icon: mdi:sleep-off
    icon_color: green
    content: Alle wecken
    tap_action:
      action: perform-action
      perform_action: necromancer.unsnooze_all

# --- 'All guards' pop-up ---
- type: custom:bubble-card
  card_type: pop-up
  hash: '#necro-guards'
  name: Necromancer · Alle Wächter
  icon: mdi:shield-search
  width_desktop: 1400px
  cards:
  - type: custom:auto-entities
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 600px), 1fr))
        grid-gap: 8px
    card_param: cards
    sort:
      method: friendly_name
    filter:
      include:
      - integration: necromancer
        attributes:
          guard_name: '*'
        options:
          type: custom:config-template-card
          entities:
          - this.entity_id
          card:
            type: custom:bubble-card
            card_type: button
            button_type: name
            show_state: true
            entity: this.entity_id
            name: ${ states['this.entity_id'].attributes.guard_name }
            tap_action:
              action: navigate
              navigation_path: ${ '/config/devices/device/' + this.hass.entities['this.entity_id'].device_id }
            button_action:
              tap_action:
                action: navigate
                navigation_path: ${ '/config/devices/device/' + this.hass.entities['this.entity_id'].device_id }
            sub_button: |-
              ${ (() => {
                const st = states['this.entity_id'];
                const a = st.attributes;

                /* main: status icons (top right) */
                const main = [];
                if (a.health_entity) {
                  main.push({ entity: a.health_entity, show_state: false, show_name: true, name: 'Health' });
                }
                if (a.auto_recovery_entity) {
                  main.push({ entity: a.auto_recovery_entity, show_state: false, show_name: true, name: 'Auto-repair', tap_action: { action: 'toggle' } });
                }

                /* primary row: Revive now + counts */
                const primary = [];
                if (a.revive_entity) {
                  primary.push({
                    icon: 'mdi:flash',
                    name: 'Revive now',
                    show_name: true,
                    show_state: false,
                    fill_width: false,
                    tap_action: {
                      action: 'perform-action',
                      perform_action: 'button.press',
                      target: { entity_id: a.revive_entity },
                      confirmation: { text: 'Revive ' + (a.guard_name || 'this guard') + ' now?' }
                    }
                  });
                }
                primary.push({ entity: 'this.entity_id', show_attribute: true, attribute: 'recover_count', icon: 'mdi:backup-restore', show_name: true, name: 'Repairs', fill_width: false });
                primary.push({ entity: 'this.entity_id', show_attribute: true, attribute: 'fail_count', icon: 'mdi:alert-circle', show_name: true, name: 'Fails', fill_width: false });

                /* secondary row (on small screens goes below): snooze + driver */
                const secondary = [];
                const snoozed = st.state === 'snoozed';
                secondary.push({
                  icon: snoozed ? 'mdi:sleep-off' : 'mdi:sleep',
                  name: snoozed ? 'Deactivate snooze' : 'Activate snooze',
                  show_name: true,
                  show_state: false,
                  show_background: snoozed,
                  fill_width: false,
                  tap_action: {
                    action: 'perform-action',
                    perform_action: snoozed ? 'necromancer.unsnooze' : 'necromancer.snooze',
                    target: { entity_id: 'this.entity_id' },
                    data: snoozed ? {} : { duration: '01:00:00' }
                  }
                });
                let rd = (a.recover_driver || '').split('→')[0].trim();
                if (rd && rd.indexOf(' ') === -1 && rd.indexOf('.') > 0) {
                  rd = rd.split('.').slice(1).join('.');
                }
                if (rd && rd !== '—') {
                  secondary.push({ entity: 'this.entity_id', name: rd, show_name: true, show_state: false, icon: 'mdi:wrench', fill_width: false });
                }

                /* responsive: small screen -> two groups (stacked as rows via bottom_layout); large -> one group */
                const small = window.matchMedia('(max-width: 600px)').matches;
                const bottom = small
                  ? [
                      { buttons_layout: 'inline', justify_content: 'end', group: primary },
                      { buttons_layout: 'inline', justify_content: 'end', group: secondary }
                    ]
                  : [
                      { buttons_layout: 'inline', justify_content: 'end', group: primary.concat(secondary) }
                    ];

                return { main: main, bottom: bottom, bottom_layout: 'rows' };
              })() }
            card_mod:
              style: |-
                {% set s = states(config.entity) %}{% set m = {'ok':'76,175,80','suspect':'255,152,0','blind':'120,144,156','recovering':'33,150,243','verify':'0,188,212','cooldown':'120,144,156','escalated':'244,67,54','snoozed':'156,39,176'} %}{% set c = m.get(s,'120,144,156') %}
                .bubble-button-card-container {
                  background: linear-gradient(135deg, rgba({{c}},0.30) 0%, rgba({{c}},0.08) 100%) !important;
                  border: 1px solid rgba({{c}},0.55) !important;
                  border-radius: 18px !important;
                  {% if s == 'escalated' %}animation: mc-pulse 1.4s ease-in-out infinite;{% endif %}
                }
                @keyframes mc-pulse {0%,100%{box-shadow:0 0 0 0 rgba(244,67,54,.55);}50%{box-shadow:0 0 22px 4px rgba(244,67,54,.55);}}
            scrolling_effect: false
            rows: '${ window.matchMedia(''(max-width: 600px)'').matches ? 3 : 2 }'
