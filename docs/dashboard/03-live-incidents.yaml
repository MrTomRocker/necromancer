          {%- set rd = rd.split('.', 1)[1] if (' ' not in rd and '.' in rd) else rd -%}
          Reparatur · Versuch {{ attempt }} · {{ rd }}
        icon: mdi:loading
        icon_color: blue
        badge_icon: |-
          {%- set h = state_attr(config.entity, 'health_entity') -%}
          {{ 'mdi:lan-disconnect' if is_state(h, 'off')
             else ('mdi:lan-pending' if states(h) in ['unavailable', 'unknown']
             else 'mdi:lan-connect') }}
        badge_color: |-
          {%- set h = state_attr(config.entity, 'health_entity') -%}
          {{ 'red' if is_state(h, 'off')
             else ('grey' if states(h) in ['unavailable', 'unknown']
             else 'green') }}
        tap_action:
          action: navigate
          navigation_path: ${ '/config/devices/device/' + this.hass.entities['this.entity_id'].device_id }
        card_mod:
          style:
            mushroom-state-info$: |-
              .primary {
                white-space: nowrap !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
                display: block !important;
              }
  - integration: necromancer
    state: suspect
