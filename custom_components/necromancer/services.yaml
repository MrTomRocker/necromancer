repair_poe_port:
  fields:
    id:
      required: true
      example: "ec:b5:fa:12:fd:07"
      selector:
        text:

reset:
  target:
    entity:
      integration: necromancer
      domain: sensor

snooze:
  target:
    entity:
      integration: necromancer
      domain: sensor
  fields:
    duration:
      required: true
      example: "01:00:00"
      selector:
        duration:

unsnooze:
  target:
    entity:
      integration: necromancer
      domain: sensor

notify_guard:
  target:
    entity:
      integration: necromancer
      domain: sensor
  fields:
    message:
      required: true
      example: "Sanfter Neustart fehlgeschlagen – lege hart nach"
      selector:
        text:
    event:
      example: "custom"
      selector:
        text:
    event_text:
      example: "Lege hart nach"
      selector:
        text:
    attempt:
      example: 2
      selector:
        number:
          min: 0
          mode: box
    max:
      example: 2
      selector:
        number:
          min: 0
          mode: box

snooze_all:
  fields:
    duration:
      required: true
      example: "01:00:00"
      selector:
        duration:

unsnooze_all:

check_health:
  fields:
    guard:
      required: true
      example: sensor.hue_bridge_status
      selector:
        entity:
          integration: necromancer
          domain: sensor

wait_for_health:
  fields:
    guard:
      required: true
      example: sensor.hue_bridge_status
      selector:
        entity:
          integration: necromancer
          domain: sensor
    timeout:
      example: 60
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: s
          mode: box
    check_first:
      default: true
      selector:
        boolean:
