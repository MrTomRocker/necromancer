name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Download repo
        uses: actions/checkout@v7
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # Remove "brands" once the icon is merged into home-assistant/brands.
          ignore: brands

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Download repo
        uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Ruff check
        run: uvx ruff check custom_components/necromancer
      - name: Ruff format
        run: uvx ruff format --check custom_components/necromancer
