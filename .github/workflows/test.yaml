name: Tests

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * *"

env:
  # Home Assistant core version the tests run against. The suite uses the core
  # test harness (tests.common, enable_custom_integrations), so it needs a core
  # checkout rather than pytest-homeassistant-custom-component. Bump as needed.
  HA_CORE_REF: dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration
        uses: actions/checkout@v7
        with:
          path: integration

      - name: Checkout Home Assistant core (${{ env.HA_CORE_REF }})
        uses: actions/checkout@v7
        with:
          repository: home-assistant/core
          ref: ${{ env.HA_CORE_REF }}
          path: core

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: core/.python-version

      - name: Install Home Assistant core + test deps
        working-directory: core
        run: |
          pip install --upgrade pip
          # paho-mqtt: core's tests/common.py imports paho.mqtt at module level,
          # but it ships via the mqtt integration, not requirements_test.txt.
          pip install -e . -r requirements_test.txt paho-mqtt

      - name: Link Necromancer into the core test tree
        run: |
          mkdir -p core/tests/testing_config/custom_components
          ln -s "$GITHUB_WORKSPACE/integration/custom_components/necromancer" \
                core/tests/testing_config/custom_components/necromancer
          # Place the suite under tests/ but NOT tests/components/, so pytest only
          # loads tests/conftest.py (needs paho, installed) and not the shared
          # tests/components/conftest.py (which imports many integration deps).
          ln -s "$GITHUB_WORKSPACE/integration/tests/suite" \
                core/tests/necromancer

      - name: pytest suite
        working-directory: core
        run: python -m pytest tests/necromancer/ -q

      - name: In-process unit scripts
        working-directory: integration
        run: |
          for f in test_units test_poe test_engine test_integration; do
            echo "::group::$f"
            PYTHONPATH="$GITHUB_WORKSPACE/core:$GITHUB_WORKSPACE/integration" \
              python "tests/$f.py"
            echo "::endgroup::"
          done
