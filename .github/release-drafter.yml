name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "💥 Breaking changes"
    labels: ["breaking"]
  - title: "🚀 Features"
    labels: ["enhancement"]
  - title: "🐛 Fixes"
    labels: ["bug"]
  - title: "🚜 Refactoring"
    labels: ["refactoring"]
  - title: "📝 Documentation"
    labels: ["documentation"]
  - title: "🏗️ Continuous integration"
    labels: ["ci"]
  - title: "📦 Dependencies"
    labels: ["dependencies"]
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels: ["breaking"]
  minor:
    labels: ["enhancement"]
  patch:
    labels: ["bug", "ci", "documentation", "dependencies", "refactoring"]
  default: patch
autolabeler:
  - label: "breaking"
    title: ["/!:/", "/^[a-z]+(\\(.+\\))?!:/i"]
  - label: "enhancement"
    title: ["/^feat/i"]
  - label: "bug"
    title: ["/^fix/i"]
  - label: "documentation"
    title: ["/^docs/i"]
  - label: "refactoring"
    title: ["/^refactor/i"]
  - label: "ci"
    title: ["/^ci/i", "/^chore/i", "/^build/i"]
  - label: "dependencies"
    title: ["/^deps/i", "/bump/i"]
template: |
  ## Changes

  $CHANGES
